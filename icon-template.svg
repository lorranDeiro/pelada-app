<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Background -->
  <rect width="192" height="192" fill="#1a1a1a"/>
  
  <!-- Soccer Ball -->
  <g transform="translate(96, 96)">
    <!-- Pentagon pattern -->
    <circle cx="0" cy="0" r="65" fill="none" stroke="#22c55e" stroke-width="2"/>
    
    <!-- Pentagons -->
    <polygon points="0,-65 38,-20 24,52 -24,52 -38,-20" fill="none" stroke="#22c55e" stroke-width="2"/>
    <polygon points="0,-65 38,-20 62,15 38,50 0,65" fill="none" stroke="#22c55e" stroke-width="2"/>
    <polygon points="38,-20 62,-65 75,-20 62,15 38,-20" fill="none" stroke="#22c55e" stroke-width="2"/>
    
    <!-- Hexagons filled with gradient effect -->
    <circle cx="0" cy="-40" r="12" fill="#22c55e" opacity="0.8"/>
    <circle cx="40" cy="-24" r="12" fill="#22c55e" opacity="0.8"/>
    <circle cx="50" cy="20" r="12" fill="#22c55e" opacity="0.8"/>
    <circle cx="20" cy="50" r="12" fill="#22c55e" opacity="0.8"/>
    <circle cx="-20" cy="50" r="12" fill="#22c55e" opacity="0.8"/>
    <circle cx="-50" cy="20" r="12" fill="#22c55e" opacity="0.8"/>
    <circle cx="-40" cy="-24" r="12" fill="#22c55e" opacity="0.8"/>
  </g>
  
  <!-- Stats indicator (top right) -->
  <g transform="translate(140, 25)">
    <circle cx="0" cy="0" r="18" fill="#22c55e"/>
    <text x="0" y="6" font-size="20" font-weight="bold" fill="#1a1a1a" text-anchor="middle" font-family="Arial">★</text>
  </g>
</svg>
